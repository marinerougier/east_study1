/* Extrinsic Affective Simon Task (EAST) */

/*
Behavior:
- Fixation cross (“+”, white) for 500 ms
- Word stays until a correct response is given:
    * participant responds
    * if incorrect: show same word + red X underneath and require correct response to continue
- Inter-trial interval (blank) for 1500 ms

IMPORTANT: In your jsPsych runtime, responses are stored as `key_press` (keycode),
not `response`. So correctness MUST use d.key_press.
*/

function removeEastUI(){

// ---------- COUNTERBALANCING ----------
var mapping = jsPsych.randomization.sampleWithoutReplacement([0,1], 1)[0];
// mapping=0: Attractive=E, Unattractive=I
// mapping=1: Attractive=I, Unattractive=E

var ATTR_KEYCODE   = (mapping === 0) ? EAST_KEYCODES.left : EAST_KEYCODES.right;
var UNATTR_KEYCODE = (mapping === 0) ? EAST_KEYCODES.right : EAST_KEYCODES.left;

// Color mapping fixed: blue=E, green=I
var BLUE_KEYCODE  = EAST_KEYCODES.left;
var GREEN_KEYCODE = EAST_KEYCODES.right;

function isCongruent(colorName){
  var ck = (colorName === "blue") ? BLUE_KEYCODE : GREEN_KEYCODE;
  return ck === ATTR_KEYCODE;
}

// Save mapping in dataset once
jsPsych.data.addProperties({
  EAST_left_key: EAST_KEYS.left,
  EAST_right_key: EAST_KEYS.right,
  EAST_left_keycode: EAST_KEYCODES.left,
  EAST_right_keycode: EAST_KEYCODES.right,
  EAST_attr_keycode: ATTR_KEYCODE,
  EAST_unattr_keycode: UNATTR_KEYCODE,

  EAST_green_keycode: GREEN_KEYCODE
});

// ---------- FORCED-CORRECT (uses key_press) ----------
function forcedCorrectTrial(stimulusFn, baseData){
  var showX = false;
  var attempt = 0;

  return {
    timeline: [{
      type: "html-keyboard-response",
      choices: [EAST_KEYS.left, EAST_KEYS.right], // jsPsych logs `key_press` as keycode
      stimulus: function(){
        return stimulusFn(showX);
      },
      trial_duration: null,
      data: function(){
        var d = Object.assign({}, baseData);
        d.attempt = attempt + 1;
        d.show_x = showX ? 1 : 0;
        return d;
      },
      on_finish: function(d){
        d.correct = (d.key_press === d.correct_key);
        showX = !d.correct;
        attempt += 1;
      }
    }],
    loop_function: function(loopData){
      var vals = loopData.values();
      var last = vals[vals.length - 1];
      return !last.correct;
    }
  };
}

function nameTrial(stim, blockLabel){
  var baseData = {
    task: "EAST",
    block: blockLabel,
    phase: "trial",
    stim_type: "name",
    word: stim.word,
    category: stim.category,
    color: "white",
    correct_key: stim.correct_key,
    congruent: null
  };

  return forcedCorrectTrial(function(showX){
    return eastStimulusHTML(stim.word, null, showX);
  }, baseData);
}

function traitTrial(word, colorName, blockLabel){
  var colorHex = (colorName === "blue") ? EAST_COLORS.blue : EAST_COLORS.green;
  var ck = (colorName === "blue") ? BLUE_KEYCODE : GREEN_KEYCODE;

  var baseData = {
    task: "EAST",
    block: blockLabel,
    phase: "trial",
    stim_type: "trait",
    word: word,
    category: null,
    color: colorName,
    correct_key: ck,
    congruent: isCongruent(colorName)
  };

  return forcedCorrectTrial(function(showX){
    return eastStimulusHTML(word, colorHex, showX);
  }, baseData);
}

// ---------- FOOTER LABELS per block ----------
function footerForBlock1(){
  // Block 1: category mapping (white)
  var eMeans = (ATTR_KEYCODE === EAST_KEYCODES.left) ? "Attractive" : "Unattractive";

}

    footerHTML("I", "Press I for <b><span style='color:"+EAST_COLORS.green+";'>Green</span> words</b>")
  );
}

function footerForBlock3(){
  // Mixed: white=category mapping + colored=color mapping
  var eCat = (ATTR_KEYCODE === EAST_KEYCODES.left) ? "Attractive" : "Unattractive";
  var iCat = (ATTR_KEYCODE === EAST_KEYCODES.left) ? "Unattractive" : "Attractive";
  setEastFooterLabels(
    footerHTML("E", "<b>" + eCat + "</b> words / <b><span style='color:"+EAST_COLORS.blue+";'>Blue</span> words</b>"),
    footerHTML("I", "<b>" + iCat + "</b> words / <b><span style='color:"+EAST_COLORS.green+";'>Green</span> words</b>")
  );
}

  trial_duration: 1,
  on_start: footerForBlock3,

    "To categorize words, you will use these two keys:<br>" +
    "• Left: <kbd>" + EAST_KEYS.left.toUpperCase() + "</kbd><br>" +

    "Please try to respond as quickly and accurately as possible using the two response keys. If you make a mistake, you will see a red X and must correct your response to continue."

var instr_block1 = {
  type: "html-keyboard-response",

var instr_block2 = {

var instr_block3 = {
  type: "html-keyboard-response",
  choices: [32],
  stimulus: function(){
    var nPractice = practiceN;
    var nTest = (2 * N_TRAITS) + (2 * names.length);
    var nTotal = nPractice + nTest;

    return introHTML(
      "<center>Block 3: Mixed judgments</center>",
      "In this block, words will appear in <b>white</b>, <b>blue</b> or <b>green</b>.<br><br>" +
      "• For the adjectives (in white) referring to <b>Attractive vs. Unattractive people</b>, use the key mapping of Block 1<br>" +
      "• For the words in <b>Blue or Green</b>, use the key mapping of Block 2<br><br>" +
      "In this block, you will go through a total of <b>" + nTotal + " trials.</b>"
    );
  },
  on_start: footerForBlock3,
  data: { task:"EAST", phase:"instr_block3" }
};

// ---------- BUILD BLOCKS (fix -> forced-correct -> ITI) ----------

// Block 1: all name words once (white)
var b1 = [];
shuffle(names).forEach(function(st){
  b1.push([fix, nameTrial(st, "b1_names"), iti]);
});
b1 = _.flattenDeep(b1);

// Block 2: all traits once, balanced colors
var colors = [];
var nBlue = Math.ceil(N_TRAITS/2);
var nGreen = N_TRAITS - nBlue;
for(var i=0;i<nBlue;i++) colors.push("blue");
for(var j=0;j<nGreen;j++) colors.push("green");
colors = shuffle(colors);

var b2 = [];
var traits_shuf = shuffle(traits.slice());
for(var t=0; t<N_TRAITS; t++){
  b2.push([fix, traitTrial(traits_shuf[t], colors[t], "b2_colors"), iti]);
}
b2 = _.flattenDeep(b2);

// Block 3 practice: 20 mixed trials
var practiceN = 20;
var pNamesN = Math.min(10, names.length);
var pTraitsN = Math.min(practiceN - pNamesN, N_TRAITS);

var practice_items = [];
shuffle(names.slice()).slice(0, pNamesN).forEach(function(st){
  practice_items.push({type:"name", stim: st});
});
shuffle(traits.slice()).slice(0, pTraitsN).forEach(function(w){
  practice_items.push({type:"trait", word: w, color: (Math.random()<0.5 ? "blue":"green")});
});
while(practice_items.length < practiceN){
  practice_items.push({type:"name", stim: names[practice_items.length % names.length]});
}
practice_items = shuffle(practice_items);

var b3_practice = [];
practice_items.forEach(function(it){
  if(it.type === "name"){
    b3_practice.push([fix, nameTrial(it.stim, "b3_practice"), iti]);
  } else {
    b3_practice.push([fix, traitTrial(it.word, it.color, "b3_practice"), iti]);
  }
});
b3_practice = _.flattenDeep(b3_practice);

// Block 3 test:
// - ALL traits: once BLUE + once GREEN
// - ALL white words: each shown twice
var test_items = [];

traits.forEach(function(w){
  test_items.push({ stim_type: "trait", word: w, color: "blue" });
  test_items.push({ stim_type: "trait", word: w, color: "green" });
});

names.forEach(function(st){
  test_items.push({ stim_type: "name", stim: st });
  test_items.push({ stim_type: "name", stim: st });
});

test_items = shuffle(test_items);

var b3_test = [];
test_items.forEach(function(it){
  if(it.stim_type === "trait"){
    b3_test.push([fix, traitTrial(it.word, it.color, "b3_test"), iti]);
  } else {
    b3_test.push([fix, nameTrial(it.stim, "b3_test"), iti]);
  }
