/* =========================================================
   Extrinsic Affective Simon Task (EAST) — FULL SCRIPT (robust loop)

   Procedure (as requested):
   - Fixation cross (“+”, white) for 500 ms
   - Word stays until a correct response is given:
       * participant responds
       * if incorrect: show same word + red X underneath
         and require correct response to continue
         (implemented as a repeat loop until correct)
   - Inter-trial interval (blank) for 1500 ms

   Data saving:
   - Every keypress attempt is saved as its own row.
     * phase="trial" for the first presentation
     * phase="correction" for subsequent repetitions after an error
   - correct = TRUE/FALSE on each attempt
   - This is ideal for scoring later in R.

   IMPORTANT FIX:
   - We avoid conditional timelines for correction
   - We use a loop_function that repeats until correct
   ========================================================= */


/* =========================
   SETTINGS
   ========================= */
var EAST_KEYS = { left: 'f', right: 'j' };
var EAST_COLORS = { blue: '#1e5bff', green: '#16a34a' };

// Must be null to keep stimulus until response
var EAST_DEADLINE = null;

function shuffle(a){ return jsPsych.randomization.shuffle(a); }


/* =========================
   BACKGROUND (EAST only)
   ========================= */
var east_bg_on = {
  type: "html-keyboard-response",

};

var east_bg_off = {

/* =========================
   COUNTERBALANCING
   ========================= */
var mapping = jsPsych.randomization.sampleWithoutReplacement([0,1], 1)[0];
// mapping=0: Attractive=left, Unattractive=right
// mapping=1: Attractive=right, Unattractive=left
var ATTR_KEY   = (mapping === 0) ? EAST_KEYS.left : EAST_KEYS.right;
var UNATTR_KEY = (mapping === 0) ? EAST_KEYS.right : EAST_KEYS.left;

// Color mapping fixed: blue=left, green=right
var BLUE_KEY  = EAST_KEYS.left;
var GREEN_KEY = EAST_KEYS.right;

function isCongruent(colorName){
  var ck = (colorName === "blue") ? BLUE_KEY : GREEN_KEY;
  return jsPsych.pluginAPI.compareKeys(ck, ATTR_KEY);
}

// Save mapping once for later scoring in R
jsPsych.data.addProperties({
  EAST_left_key: EAST_KEYS.left,
  EAST_right_key: EAST_KEYS.right,
  EAST_attr_key: ATTR_KEY,
  EAST_unattr_key: UNATTR_KEY,
  EAST_blue_key: BLUE_KEY,
  EAST_green_key: GREEN_KEY,
  EAST_mapping: mapping
});

var iti = {
  type: "html-keyboard-response",

  choices: jsPsych.NO_KEYS,
  trial_duration: 1500,
  data: { task: "EAST", phase: "iti" }
};


/* =========================
   CORE: respond-until-correct via LOOP (robust)
   =========================
   Each stimulus becomes:
   [fix] -> [looped response trial until correct] -> [iti]

   After the first error, the red X is displayed on subsequent repeats.
*/
function buildEASTSequence(params){
  // Local state (closure): whether we should show the red X now
  var show_error = false;

  // This is the "one screen" repeated until correct
  var response_trial = {
    type: "html-keyboard-response",
    choices: [EAST_KEYS.left, EAST_KEYS.right],
    trial_duration: EAST_DEADLINE, // null => until response
    stimulus: function(){
      return show_error ? params.errorHTML : params.stimulusHTML;
    },
    data: function(){
      return Object.assign({}, params.dataBase, {
        // First time = trial, later repeats = correction
        phase: show_error ? "correction" : "trial",
        correct_key: params.correct_key
      });
    },
    on_finish: function(d){
      // Robust key comparison (handles keycodes vs letters)
      d.correct = jsPsych.pluginAPI.compareKeys(d.response, params.correct_key);
      d.timed_out = false;

      // If incorrect, we turn on the error display for the next repeat
      if(!d.correct){
        show_error = true;
      }
    }
  };

  // Loop wrapper: repeat response_trial until last response was correct
  var loop_until_correct = {
    timeline: [response_trial],
    loop_function: function(data){
      var last = data.values()[data.values().length - 1];
      return last && last.correct === false; // repeat if incorrect
    }
  };

  return [fix, loop_until_correct, iti];
}


// White-word sequence (Attractive/Unattractive)
function nameSequence(stim, blockLabel){
  return buildEASTSequence({
    stimulusHTML: stimHTML(stim.word, null),
    errorHTML: stimHTML_withError(stim.word, null),
    correct_key: stim.correct_key,
    dataBase: {
      task: "EAST",
      block: blockLabel,
      stim_type: "name",
      word: stim.word,
      category: stim.category,
      color: "white",
      congruent: null
    }
  });
}

// Colored trait sequence (Blue/Green)
function traitSequence(word, colorName, blockLabel){
  var colorHex = (colorName === "blue") ? EAST_COLORS.blue : EAST_COLORS.green;
  var correct_key = (colorName === "blue") ? BLUE_KEY : GREEN_KEY;

  return buildEASTSequence({
    stimulusHTML: stimHTML(word, colorHex),
    errorHTML: stimHTML_withError(word, colorHex),
    correct_key: correct_key,
    dataBase: {
      task: "EAST",
      block: blockLabel,
      stim_type: "trait",
      word: word,
      category: null,
      color: colorName,
      congruent: isCongruent(colorName)
    }
  });
}

var instr_block1 = {

var instr_block2 = {

var instr_block3 = {
  type: "html-keyboard-response",
  choices: [32],
  stimulus: function(){
    return introHTML(
      "Block 3: Mixed judgments",

      "First 20 trials are practice.<br><br>" +
      "<b>Important:</b> The word will stay on the screen until you respond correctly. " +

  data: { task:"EAST", phase:"instr_block3" }

/* =========================
   BUILD BLOCKS
   ========================= */

// Block 1: all name words once
var b1 = [];
shuffle(names).forEach(function(st){
  b1.push(nameSequence(st, "b1_names"));
});
b1 = _.flattenDeep(b1);

// Block 2: all traits once, balanced colors
var colors = [];
var nBlue = Math.ceil(N_TRAITS/2);
var nGreen = N_TRAITS - nBlue;
for(var i=0;i<nBlue;i++) colors.push("blue");
for(var j=0;j<nGreen;j++) colors.push("green");
colors = shuffle(colors);

var b2 = [];
var traits_shuf = shuffle(traits.slice());
for(var t=0; t<N_TRAITS; t++){
  b2.push(traitSequence(traits_shuf[t], colors[t], "b2_colors"));
}
b2 = _.flattenDeep(b2);

// Block 3 practice: 20 mixed trials (tries 10 names + 10 traits)
var practiceN = 20;
var pNamesN = Math.min(10, names.length);
var pTraitsN = Math.min(practiceN - pNamesN, N_TRAITS);

var practice_items = [];
shuffle(names.slice()).slice(0, pNamesN).forEach(function(st){
  practice_items.push({type:"name", stim: st});
});
shuffle(traits.slice()).slice(0, pTraitsN).forEach(function(w){
  practice_items.push({type:"trait", word: w, color: (Math.random()<0.5 ? "blue":"green")});
});

// Fill to 20 if needed (can repeat names in practice)
while(practice_items.length < practiceN){
  practice_items.push({type:"name", stim: names[practice_items.length % names.length]});
}
practice_items = shuffle(practice_items);

var b3_practice = [];
practice_items.forEach(function(it){
  if(it.type === "name"){
    b3_practice.push(nameSequence(it.stim, "b3_practice"));
  } else {
    b3_practice.push(traitSequence(it.word, it.color, "b3_practice"));
  }
});
b3_practice = _.flattenDeep(b3_practice);

// Block 3 test (as in article): traits twice (blue+green) + each name twice, mixed
var b3_test_pairs = [];
var test_items = [];

traits.forEach(function(w){
  test_items.push({ stim_type: "trait", word: w, color: "blue" });
  test_items.push({ stim_type: "trait", word: w, color: "green" });
});

names.forEach(function(st){
  test_items.push({ stim_type: "name", stim: st });
  test_items.push({ stim_type: "name", stim: st });
});

test_items = shuffle(test_items);

test_items.forEach(function(it){
  if(it.stim_type === "trait"){
    b3_test_pairs.push(traitSequence(it.word, it.color, "b3_test"));
  } else {
    b3_test_pairs.push(nameSequence(it.stim, "b3_test"));
  }
});

var b3_test = _.flattenDeep(b3_test_pairs);


/* =========================
   EAST TIMELINE
   ========================= */

east_timeline.push(east_intro);

east_timeline.push(instr_block1);
east_timeline = east_timeline.concat(b1);

east_timeline.push(instr_block2);
east_timeline = east_timeline.concat(b2);

east_timeline.push(instr_block3);
east_timeline = east_timeline.concat(b3_practice);
east_timeline = east_timeline.concat(b3_test);

  choices: [32],
  stimulus: introHTML("End of word task", "You have completed the word task."),
